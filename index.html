<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; connect-src 'self' https://therapy-xsoy.onrender.com;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIココロの棚卸し - 認知行動療法人生相談</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --mint-main: #e6f7f3;
            --mint-accent: #4fd1c5;
            --mint-dark: #2d3748;
        }
        body { background-color: #f0fdfa; color: var(--mint-dark); }
        .mint-card { background: white; border: 1px solid #ccf2e9; border-radius: 1.5rem; }
        .distortion-tag {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.875rem;
            border: 1px solid #fee2e2;
        }
        input[type=range] { font-size: 1.5rem; width: 100%; cursor: pointer; }
        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f0fdfa; z-index: 9999; display: flex;
            align-items: center; justify-content: center;
        }
        /* プルダウンのスタイリング */
        details summary { cursor: pointer; list-style: none; outline: none; }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="password-overlay">
        <div class="mint-card p-8 shadow-xl text-center space-y-4 mx-4 w-full max-w-sm">
            <h2 class="text-xl font-bold text-teal-800">パスワードが必要です</h2>
            <input type="password" id="pass-input" class="w-full p-3 border border-teal-100 rounded-xl outline-none focus:ring-2 focus:ring-teal-400" placeholder="Password">
            <button onclick="checkPassword()" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-2 rounded-xl transition">認証</button>
        </div>
    </div>

    <div id="main-content" class="invisible max-w-2xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-teal-800">AIココロの棚卸しアプリ</h1>
            <p class="text-teal-600 mt-2">あなたの認知の歪みを、少し変えてみませんか。</p>
        </header>

        <div id="input-section" class="mint-card shadow-sm p-8 space-y-6">
            <div>
                <label class="block text-lg font-semibold mb-3">1. 今、頭に浮かんでいることは？</label>
                <textarea id="user-thought" class="w-full h-32 p-4 border border-teal-100 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-transparent outline-none bg-teal-50/30 transition" placeholder="例：連絡が来ない。嫌われたに違いない。"></textarea>
            </div>

            <div>
                <label class="block text-lg font-semibold mb-1">2. その考えにどれくらいとらわれていますか？</label>
                <div class="flex items-center gap-4">
                    <input type="range" id="belief-range" min="0" max="100" value="50" class="accent-teal-500" oninput="document.getElementById('range-val').innerText = this.value + '%'">
                    <span id="range-val" class="text-2xl font-bold text-teal-600 w-16 text-right">50%</span>
                </div>
            </div>

            <button onclick="analyzeThought()" id="submit-btn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-teal-100 text-lg">
                心を分析する
            </button>
        </div>

        <div id="loading" class="hidden text-center py-16">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-teal-500 border-t-transparent"></div>
            <p class="mt-6 text-teal-700 font-medium">AIカウンセラーが分析しています...</p>
        </div>

        <div id="result-section" class="hidden space-y-6 mt-8">
            <div class="space-y-4">
                <h2 class="text-xl font-bold text-teal-800 text-center mb-4">3つのモードでアドバイス</h2>
                
                <details class="bg-orange-50 border border-orange-100 rounded-3xl overflow-hidden">
                    <summary class="p-6 font-bold text-orange-600 flex justify-between items-center">
                        <span>📢 昭和モード</span>
                        <span class="text-xs opacity-50">クリックで展開</span>
                    </summary>
                    <div class="px-6 pb-6 text-orange-900 leading-relaxed text-sm md:text-base border-t border-orange-100/50 pt-4">
                        <p id="preach-text"></p>
                    </div>
                </details>

                <details class="bg-slate-100 border border-slate-200 rounded-3xl overflow-hidden">
                    <summary class="p-6 font-bold text-slate-600 flex justify-between items-center">
                        <span>😐 平成モード</span>
                        <span class="text-xs opacity-50">クリックで展開</span>
                    </summary>
                    <div class="px-6 pb-6 text-slate-800 leading-relaxed text-sm md:text-base border-t border-slate-200/50 pt-4">
                        <p id="blank-text"></p>
                    </div>
                </details>

                <details class="bg-pink-50 border border-pink-100 rounded-3xl overflow-hidden">
                    <summary class="p-6 font-bold text-pink-500 flex justify-between items-center">
                        <span>🌸 令和モード</span>
                        <span class="text-xs opacity-50">クリックで展開</span>
                    </summary>
                    <div class="px-6 pb-6 text-pink-900 leading-relaxed text-sm md:text-base border-t border-pink-100/50 pt-4">
                        <p id="heal-text"></p>
                    </div>
                </details>
            </div>

            <div class="mint-card p-6 shadow-sm text-center">
                <h3 class="text-xs font-bold text-teal-400 uppercase tracking-widest mb-4">見つかった認知の歪み</h3>
                <div id="distortion-list" class="flex flex-wrap justify-center gap-2"></div>
            </div>

            <div class="mint-card p-6 border-l-4 border-l-teal-400">
                <h3 class="font-bold text-teal-700 mb-2">💡 その考えのメリット</h3>
                <p id="benefit-text" class="text-slate-600 text-sm leading-relaxed"></p>
            </div>

            <div class="bg-teal-600 text-white rounded-3xl p-8 shadow-md">
                <h3 class="text-teal-100 text-sm font-bold uppercase mb-4 tracking-wider">🚀 次のステップ</h3>
                <ul id="action-list" class="list-disc list-inside space-y-2 font-medium"></ul>
            </div>

            <button onclick="location.reload()" class="w-full py-6 text-teal-500 hover:text-teal-700 font-bold transition flex items-center justify-center gap-2">
                <span>←</span> 別のことを相談する
            </button>
        </div>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "okok") {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('main-content').classList.remove('invisible');
            } else {
                alert("パスワードが違います。");
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetch('https://therapy-xsoy.onrender.com/')
                .then(r => console.log('Backend Awake'))
                .catch(e => console.error('Wake-up error:', e));
        });

        async function analyzeThought() {
            const thought = document.getElementById('user-thought').value;
            const belief = document.getElementById('belief-range').value;
            if (!thought) return alert('今の気持ちを入力してください');

            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('https://therapy-xsoy.onrender.com/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        thought: thought,
                        belief: belief
                    })
                });

                if (!response.ok) throw new Error(`Server error: ${response.status}`);
                
                const data = await response.json();
                displayResults(data);

            } catch (error) {
                alert("エラーが発生しました。コンソールを確認してください。");
                console.error(error);
                document.getElementById('input-section').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function displayResults(data) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');

            const res = (typeof data === 'string') ? JSON.parse(data) : data;

            const distList = document.getElementById('distortion-list');
            distList.innerHTML = '';
            (res.distortions || ["なし"]).forEach(d => {
                const span = document.createElement('span');
                span.className = 'distortion-tag';
                span.innerText = d;
                distList.appendChild(span);
            });

            document.getElementById('preach-text').innerText = res.preach_mode || '...';
            document.getElementById('blank-text').innerText = res.blank_mode || '...';
            document.getElementById('heal-text').innerText = res.heal_mode || '...';
            
            document.getElementById('benefit-text').innerText = res.benefit || '-';

            const actionList = document.getElementById('action-list');
            actionList.innerHTML = '';
            (res.actions || []).forEach(a => {
                const li = document.createElement('li');
                li.innerText = a;
                actionList.appendChild(li);
            });
        }
    </script>
</body>
</html>
