<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; connect-src 'self' https://therapy-xsoy.onrender.com;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ココロの整理 - CBTアシスタント</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --mint-main: #e6f7f3;
            --mint-accent: #4fd1c5;
            --mint-dark: #2d3748;
        }
        body { background-color: #f0fdfa; color: var(--mint-dark); font-family: sans-serif; }
        .mint-card { background: white; border: 1px solid #ccf2e9; border-radius: 1.5rem; }
        .distortion-tag {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 0.875rem;
            border: 1px solid #fee2e2;
        }
        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f0fdfa; z-index: 9999; display: flex;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="password-overlay">
        <div class="mint-card p-8 shadow-xl text-center space-y-4 mx-4 w-full max-w-sm">
            <h2 class="text-xl font-bold text-teal-800">パスワードが必要です</h2>
            <input type="password" id="pass-input" class="w-full p-3 border border-teal-100 rounded-xl outline-none focus:ring-2 focus:ring-teal-400" placeholder="Password">
            <button onclick="checkPassword()" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-2 rounded-xl transition">認証</button>
        </div>
    </div>

    <div id="main-content" class="invisible max-w-2xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-teal-800">ココロの整理</h1>
            <p class="text-teal-600 mt-2">あなたの思考を、3つのモードで解体します。</p>
        </header>

        <div id="input-section" class="mint-card shadow-sm p-8 space-y-6">
            <div>
                <label class="block text-lg font-semibold mb-3">1. 今、頭に浮かんでいることは？</label>
                <textarea id="user-thought" class="w-full h-32 p-4 border border-teal-100 rounded-xl focus:ring-2 focus:ring-teal-400 outline-none bg-teal-50/30 transition" placeholder="今の考えを入力してください..."></textarea>
            </div>
            <button onclick="analyzeThought()" id="submit-btn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all text-lg">
                心を分析する
            </button>
        </div>

        <div id="loading" class="hidden text-center py-16">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-teal-500 border-t-transparent"></div>
            <p class="mt-6 text-teal-700 font-medium">深層心理を解析中...</p>
        </div>

        <div id="result-section" class="hidden space-y-6 mt-8">
            <div class="mint-card p-6 text-center shadow-sm">
                <h3 class="text-xs font-bold text-teal-400 uppercase mb-4 tracking-widest">特定された認知の歪み</h3>
                <div id="distortion-list" class="flex flex-wrap justify-center gap-2"></div>
            </div>

            <div class="space-y-4">
                <div class="bg-red-50 border border-red-100 rounded-2xl p-6 shadow-sm">
                    <h3 class="text-red-600 font-bold mb-3 flex items-center gap-2">📢 お説教モード</h3>
                    <p id="preach-text" class="text-red-900 text-sm leading-relaxed whitespace-pre-wrap"></p>
                </div>
                <div class="bg-slate-100 border border-slate-200 rounded-2xl p-6 shadow-sm">
                    <h3 class="text-slate-600 font-bold mb-3 flex items-center gap-2">😐 無表情モード</h3>
                    <p id="blank-text" class="text-slate-900 text-sm leading-relaxed whitespace-pre-wrap"></p>
                </div>
                <div class="bg-pink-50 border border-pink-100 rounded-2xl p-6 shadow-sm">
                    <h3 class="text-pink-600 font-bold mb-3 flex items-center gap-2">🌸 癒しモード</h3>
                    <p id="heal-text" class="text-pink-900 text-sm leading-relaxed whitespace-pre-wrap"></p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="mint-card p-6 border-l-4 border-l-teal-400 shadow-sm">
                    <h3 class="font-bold text-teal-700 mb-2">💡 防衛反応のメリット</h3>
                    <p id="benefit-text" class="text-slate-600 text-sm"></p>
                </div>
                <div class="bg-teal-600 text-white rounded-2xl p-6 shadow-sm">
                    <h3 class="text-teal-100 text-xs font-bold mb-3 uppercase tracking-widest">🚀 具体的な行動指針</h3>
                    <ul id="action-list" class="list-disc list-inside text-sm space-y-1"></ul>
                </div>
            </div>

            <button onclick="location.reload()" class="w-full py-6 text-teal-500 font-bold hover:text-teal-700 transition">
                ← 別のことを相談する
            </button>
        </div>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById('pass-input').value === "okok") {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('main-content').classList.remove('invisible');
            } else { alert("パスワードが違います。"); }
        }

        async function analyzeThought() {
            const thought = document.getElementById('user-thought').value;
            if (!thought) return alert('入力してください');

            // 画面切り替え：入力を隠してローディングを表示
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                // 正しい現在のバックエンドURLに修正
                const response = await fetch('https://therapy-xsoy.onrender.com/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thought: thought })
                });

                if (!response.ok) throw new Error('サーバーエラー: ' + response.status);
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                alert("通信に失敗しました。時間をおいて再度お試しください。");
                location.reload();
            }
        }

        function displayResults(data) {
            // 画面切り替え：ローディングを隠して結果を表示
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');

            const distList = document.getElementById('distortion-list');
            distList.innerHTML = '';
            (data.distortions || []).forEach(d => {
                const span = document.createElement('span');
                span.className = 'distortion-tag';
                span.innerText = d;
                distList.appendChild(span);
            });

            document.getElementById('preach-text').innerText = data.preach_mode || '-';
            document.getElementById('blank-text').innerText = data.blank_mode || '-';
            document.getElementById('heal-text').innerText = data.heal_mode || '-';
            document.getElementById('benefit-text').innerText = data.benefit || '-';

            const actionList = document.getElementById('action-list');
            actionList.innerHTML = '';
            (data.actions || []).forEach(a => {
                const li = document.createElement('li');
                li.innerText = a;
                actionList.appendChild(li);
            });
        }
    </script>
</body>
</html>
